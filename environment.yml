# Conda environment for plasma-playground.
# Conda handles the scientific/compiled stack cleanly on Apple Silicon (arm64).
#
#   conda env create -f environment.yml
#   conda activate plasma-playground
#   pip install -e .            # install this repo's `plasmaplay` package
#
# Prefer uv/pip instead? See pyproject.toml — `uv pip install -e ".[notebooks]"`.
name: plasma-playground
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.26
  - scipy>=1.12
  - matplotlib>=3.8
  - numba>=0.59
  - astropy>=6.0
  - jupyterlab>=4.0
  - ipympl>=0.9
  - pip
  - pip:
      - plasmapy>=2024.7
      - -e .
